# =============================================================================
# sequences.yaml — Lead-nurture cadences for Carrie Billeaud, REALTOR (eXp Realty)
# =============================================================================
# THE MODEL: trigger -> DRAFT -> APPROVE -> send. Nothing here auto-sends.
#
#   trigger   A captured lead (from /api/lead: contact form, sell-my-house
#             valuation, or ai-chat capture_lead) is enqueued into ONE sequence
#             below, keyed by what the lead is (buyer / seller / past client /
#             cold). Enqueue requires a STATED-CONSENT flag on the lead — TCPA
#             for SMS, CAN-SPAM for email. No consent -> no drafting.
#   DRAFT     For each step, generate_nurture.py (or functions/api/nurture.js in
#             real mode) drafts the copy. Every draft is status:"draft".
#   APPROVE   Carrie reviews each drafted message in the studio (nurture.html)
#             and approves / edits / skips it. Approval is the ONLY thing that
#             flips a draft to sendable.
#   send      Only an approved draft may send, on its day_offset, through
#             whatever gateway is wired at deploy (out of scope here). STOP /
#             unsubscribe suppression is honored before any send.
#
# NO SALES-PRESSURE CADENCE. Steps are spaced in DAYS (never hours), lead with
# something useful, and never manufacture urgency ("act now", "won't last").
# Intents are deliberately generic and non-demographic — a helpful welcome,
# listings matching the lead's OWN stated criteria, a useful local resource, a
# gentle check-in. Content compliance (fair-housing, facts-only, opt-out) is
# enforced by _nurture_system_prompt.md, which the drafters load as the system
# prompt. This file only defines WHEN and ON WHAT CHANNEL a step goes out.
#
# STEP FIELDS
#   day_offset  int   days after enqueue the (approved) step is scheduled to send
#   channel     str   "email" | "sms"
#   intent      str   the low-pressure purpose of the message; passed to the
#                     drafter as the brief for that step (NOT sent verbatim)
#
# CONSENT NOTE: SMS steps presume TCPA express consent captured at lead time;
# email steps presume a CAN-SPAM-compliant relationship + unsubscribe. Every
# drafted message carries its opt-out line regardless (SMS "Reply STOP to opt
# out"; email an unsubscribe line). Cadence + copy should be reviewed by Carrie
# / the broker (LREC + eXp) before any live use.
# =============================================================================

sequences:

  # New buyer lead — someone who reached out about buying. Welcome first, then a
  # single criteria-matched listings touch, a genuinely useful buyer resource,
  # and a soft check-in. Buyer-side, low pressure.
  new_buyer_lead:
    label: "New buyer lead"
    description: "A fresh buyer inquiry. Warm welcome, then helpful, spaced-out touches."
    steps:
      - day_offset: 0
        channel: email
        intent: "Helpful welcome + what to expect working with Carrie; no ask beyond 'reply anytime'."
      - day_offset: 2
        channel: sms
        intent: "Short, friendly note offering to set up a saved home search matching the buyer's OWN stated criteria."
      - day_offset: 7
        channel: email
        intent: "Share a useful local buying resource already on the site (e.g. the free Acadiana Home Guide, USDA zero-down basics, or flood-zone guide) — education, not a pitch."
      - day_offset: 21
        channel: email
        intent: "Gentle check-in: is now still a good time to look, or should Carrie check back later? Easy to say 'not yet'."

  # New seller lead — someone weighing selling. Welcome, an offer to prep a real
  # (human-run) comparison, a useful seller resource, and a low-key check-in.
  # No promised price, no promised timeline.
  new_seller_lead:
    label: "New seller lead"
    description: "A fresh seller inquiry. Welcome, offer to help them understand the process, useful resources."
    steps:
      - day_offset: 0
        channel: email
        intent: "Helpful welcome + what to expect when selling with Carrie; offer to answer questions, no obligation."
      - day_offset: 3
        channel: sms
        intent: "Short note offering to prepare a no-obligation home-value comparison Carrie runs herself (never quote a price or guarantee an outcome in the message)."
      - day_offset: 9
        channel: email
        intent: "Share a useful local selling resource on the site (e.g. the seller-disclosure checklist or the Louisiana closing-process guide) — education, not pressure."
      - day_offset: 24
        channel: email
        intent: "Gentle check-in on their timeline; make it easy to say they're not ready yet."

  # Past-client check-in — someone Carrie already helped. Purely relationship /
  # service, not a listing push. Widely spaced.
  past_client_checkin:
    label: "Past-client check-in"
    description: "Stay-in-touch cadence for someone Carrie already closed with. Service, not selling."
    steps:
      - day_offset: 0
        channel: email
        intent: "Warm hello + a genuinely useful homeowner resource (e.g. the Louisiana homestead-exemption guide) — no ask."
      - day_offset: 45
        channel: sms
        intent: "Brief, friendly check-in — how's the home treating them; offer to help with any real-estate questions, no pitch."
      - day_offset: 120
        channel: email
        intent: "Occasional value touch: a useful local/seasonal homeowner tip or resource already on the site; remind them Carrie is a call away for anyone they know."

  # Cold-lead re-engage — an older, quiet lead. One respectful re-open and an
  # easy opt-out; if no interest, stop. Never badger.
  cold_lead_reengage:
    label: "Cold-lead re-engage"
    description: "A respectful, low-frequency re-open for a lead that went quiet. Easy to opt out; then stop."
    steps:
      - day_offset: 0
        channel: email
        intent: "Low-key 'still here if it's useful' note; offer a helpful resource; make opting out effortless and pressure-free."
      - day_offset: 30
        channel: email
        intent: "One final gentle check-in: reply if you'd like to pick things back up, otherwise Carrie won't keep reaching out. Respect silence as a no."
