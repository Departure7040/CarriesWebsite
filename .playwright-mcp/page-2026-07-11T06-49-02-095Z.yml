      - paragraph [ref=f1e51]: The Basics
      - heading "What buyer representation means" [level=2] [ref=f1e52]
      - paragraph [ref=f1e53]:
        - text: A buyer's agent works solely for you, not the seller — bringing pricing insight, negotiation on your behalf, and guidance through inspection and closing. Buyer-agent compensation depends on the listing, the offer terms, and your buyer-agency agreement. Carrie will walk through the options upfront so you understand what, if anything, you may be responsible for before you tour homes.
        - emphasis [ref=f1e54]: A signed buyer-agency agreement is standard practice in most markets today — Carrie will explain exactly how that works before you start touring homes (sample — Carrie confirms current terms).
