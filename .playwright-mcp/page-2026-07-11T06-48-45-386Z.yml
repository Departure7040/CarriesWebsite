    - generic [ref=e50]:
      - paragraph [ref=e51]: The Basics
      - heading "The first-time buyer process, step by step" [level=2] [ref=e52]
      - generic [ref=e53]:
        - generic [ref=e54]:
          - heading "1. Get pre-approved first" [level=3] [ref=e55]
          - paragraph [ref=e56]: Pre-approval means a lender has checked your income, debt and credit and told you what you can actually borrow. It comes before house-hunting, not after — without it, sellers won't take your offer seriously, and you risk falling for a home that's out of reach.
        - generic [ref=e57]:
          - heading "2. Set a realistic budget" [level=3] [ref=e58]
          - paragraph [ref=e59]:
            - text: Your budget should account for the full monthly payment (principal, interest, taxes, insurance) — not just the sale price.
            - emphasis [ref=e60]: "Current Lafayette-area starter-home price ranges (sample — Carrie confirms): specific figures shift with the market, so ask Carrie for numbers current to when you're ready to look."
        - generic [ref=e61]:
          - heading "3. Search, offer, and close" [level=3] [ref=e62]
          - paragraph [ref=e63]:
            - text: Once you're pre-approved, Carrie sets up a search built around your must-haves, helps you write a competitive offer, and coordinates inspection, appraisal and closing.
            - emphasis [ref=e64]: "Realistic local timeline from search to closing (sample — Carrie confirms): this varies by market conditions and your situation, so ask for a current estimate."
    - generic [ref=e66]:
      - paragraph [ref=e67]: Down Payments & Loan Programs
      - heading "Down payment and loan programs to know about" [level=2] [ref=e68]
      - paragraph [ref=e69]: Most first-time buyers don't put 20% down — several loan programs allow much less, and Louisiana has first-time-buyer assistance options worth asking about. Program names, eligibility rules and down-payment minimums change over time, so treat the items below as a starting point for a conversation, not final terms.
      - generic [ref=e70]:
        - heading "Programs worth asking Carrie about Sample — Carrie confirms" [level=3] [ref=e71]:
          - text: Programs worth asking Carrie about
          - generic [ref=e72]: Sample — Carrie confirms
        - paragraph [ref=e73]:
          - strong [ref=e74]: "What:"
          - text: FHA loans (lower down payment, more flexible credit requirements), VA loans (for eligible veterans and service members), USDA loans (for eligible rural and some Acadiana-area properties), and Louisiana Housing Corporation first-time-buyer assistance programs are all commonly discussed with first-time buyers.
        - paragraph [ref=e75]:
          - strong [ref=e76]: "Why it matters:"
          - text: The right program can significantly lower what you need up front — but eligibility rules and terms change, and getting this wrong is a real financial risk.
        - paragraph [ref=e77]:
          - strong [ref=e78]: "What to do:"
          - text: Don't treat this list as final terms. Ask Carrie and a local lender to confirm current eligibility and numbers for your specific situation before you budget around any one program.
    - generic [ref=e80]:
      - paragraph [ref=e81]: Avoid These
      - heading "Common first-time buyer mistakes" [level=2] [ref=e82]
      - generic [ref=e83]:
        - generic [ref=e84]:
          - heading "Shopping before pre-approval" [level=3] [ref=e85]
          - paragraph [ref=e86]: Falling for a home before you know your real budget leads to disappointment — or an offer that isn't taken seriously.
        - generic [ref=e87]:
          - heading "Waiving the inspection" [level=3] [ref=e88]
          - paragraph [ref=e89]: In a competitive market it's tempting to skip it to look stronger. An inspection is one of the best ways to avoid an expensive surprise after closing.
        - generic [ref=e90]:
          - heading "Underestimating closing costs" [level=3] [ref=e91]
          - paragraph [ref=e92]: Beyond the down payment, budget for closing costs, moving expenses and an emergency cushion for the first few months.
        - generic [ref=e93]:
          - heading "Making a big financial change mid-process" [level=3] [ref=e94]
          - paragraph [ref=e95]: New credit cards, a new car, or a job change between pre-approval and closing can jeopardize your loan. Keep your finances steady until keys are in hand.
