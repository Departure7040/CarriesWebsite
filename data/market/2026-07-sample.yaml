# =============================================================================
# Acadiana Market Report — INPUT DATA (single source of truth)
# =============================================================================
# Real numbers replace these; NEVER present sample as real.
#
# Every figure in the generated PDF, the social captions, and the landing page
# is read ONLY from this file. There are zero hardcoded statistics in the
# templates or build scripts. A metric that is missing here renders as an
# em-dash ("—") — it is never invented.
#
# TO SHIP A REAL REPORT:
#   1. Copy this file to data/market/<period>.yaml (e.g. 2026-08.yaml).
#   2. Set  sample: false
#   3. Replace `source` with the real attribution (e.g. the MLS/board name).
#   4. Replace every metric with the real, sourced numbers from Carrie's
#      authorized MLS/ROAM export. Delete any metric you don't have — it will
#      render as "—" rather than a guess.
#   5. Re-run the two build scripts (see build/market/README.md).
#
# While sample: true, a visible "SAMPLE — illustrative data" ribbon stamps the
# PDF, and every caption / landing note states the figures are illustrative.
# =============================================================================

sample: true
disclaimer: >-
  SAMPLE — illustrative data only. The figures below are placeholder values used
  to demonstrate the report format. They are NOT real Acadiana market data and
  must not be quoted, published, or relied upon. Real numbers, supplied by Carrie
  from an authorized MLS/board export, replace these before any distribution.

period: "July 2026"
area: "Acadiana / Lafayette Parish"
# __FILL__ — replace with the real data source when sample:false,
# e.g. "Realtor Association of Acadiana MLS". Left as __FILL__ so the demo never
# names an unverified source; the copy shows "(source pending)" until filled.
source: "__FILL__ (e.g. Realtor Association of Acadiana MLS)"

# Area-wide headline metrics. Obviously-round SAMPLE values.
metrics:
  median_sale_price: 250000        # dollars
  avg_days_on_market: 45           # days
  active_inventory: 900            # active listings
  closed_sales: 300                # closed in the period
  months_of_supply: 3.5            # months
  median_price_per_sqft: 150       # dollars per sq ft

# Per-town breakdown. Each town carries the same six metric keys.
# Any missing key is allowed and renders as an em-dash ("—").
